<ng-template #dialogContent>
  <div class="modal-header">
    <h4 class="modal-title">{{dialogTitle}}</h4>
    <button type="button" class="btn-close btn-close-white"
    i18n-aria-label aria-label="Close dialog" (click)="close()"></button>
  </div>
  <div class="modal-body">
    @if (!dialogBodyTemplate) {
      <p>{{dialogBody}}</p>
    }
    @if (dialogBodyTemplate) {
      <ng-container *ngTemplateOutlet="dialogBodyTemplate"></ng-container>
    }
  </div>
  @if (!hideFooter) {
    <div class="modal-footer">
      <button type="button" class="btn btn-success"
      (click)="close(true)">{{confirmString}}</button>
      @if (!hideCancel) {
        <button type="button" class="btn btn-normal"
        (click)="close(false)">{{cancelString}}</button>
      }
    </div>
  }
</ng-template>
