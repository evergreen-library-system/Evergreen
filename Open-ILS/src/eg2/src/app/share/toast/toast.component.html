<output id="eg-toast-container" role="status">
  @if (messages.length) {
    <ul class="list-unstyled">
      @for (message of messages; track message; let i = $index) {
        @if (message && message.text) {
          <li class="alert alert-{{message.style}} alert-dismissible border-2 fade shadow-lg show">
            {{message.text}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close alert" (click)="dismiss(i)"></button>
          </li>
        }
      }
    </ul>
  }
</output>
