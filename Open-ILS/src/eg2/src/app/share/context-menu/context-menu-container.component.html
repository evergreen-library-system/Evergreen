
<ng-template #menuTemplate>

  @for (entry of menuEntries; track entry) {
    <div class="menu-entry {{entryClasses}}">
      @if (entry.divider) {
        <div class="dropdown-divider"></div>
      }
      @if (!entry.divider) {
        <button (click)="entryClicked(entry)" class="btn p-0 m-0" type="button">
          {{entry.label}}
        </button>
      }
    </div>
  }
</ng-template>
