
@if (routerLink) {
  <a [routerLink]="routerLink">
    @for (val of getDisplayStrings(); track val; let first = $first) {
      @if (joiner && !first) {
        {{joiner}}
      }
      <span [innerHTML]="val"></span>
    }
  </a>
}

@if (!routerLink) {
  @for (val of getDisplayStrings(); track val; let first = $first) {
    @if (joiner && !first) {
      {{joiner}}
    }
    <span [innerHTML]="val"></span>
  }
}
