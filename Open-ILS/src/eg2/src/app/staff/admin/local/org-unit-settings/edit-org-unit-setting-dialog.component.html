<ng-template #dialogContent>
  <div class="modal-header">
    <h4 class="modal-title" i18n>Edit Setting</h4>
    <button type="button" class="btn-close btn-close-white"
    i18n-aria-label aria-label="Close dialog" (click)="close()"></button>
  </div>
  <div class="modal-body">
    <div class="row justify-content-center">
      <div class="col">
        <h5 i18n>{{entry.label}}</h5>
      </div>
    </div>
    <div class="row justify-content-center">
      <div class="col">
        <span i18n [innerHTML]="entry.description"></span>
      </div>
    </div>
    <div class="row mt-3">
      <div class="col-md-6">
        <div class="input-group">
          <label for="context-ou" class="form-label input-group-text" i18n>Context</label>
            <eg-org-select domId="context-ou"
            [initialOrg]="entryContext" (onChange)="entryContext = $event"></eg-org-select>
          </div>
        </div>
      </div>
      <div class="row mt-2">
        <div class="col-md-6">
          @switch (inputType()) {
            @case ('integer') {
              <div class="input-group">
                <label class="form-label input-group-text" for="entryValue" i18n>Value</label>
                  <input
                    class="form-control" type="number"
                    name="entryValue" id="entryValue"
                    placeholder="Input a numerical value"
                    i18n-placeholder
                    [(ngModel)]="entryValue"/>
                </div>
              }
              @case ('currency') {
                <div class="input-group">
                  <label for="entryValue" class="input-group-text" i18n>Value</label>
                    <div class="input-group-text" i18n>$</div>
                      <input id="entryValue"
                        class="form-control" type="number"
                        step="0.01"
                        name="entryValue"
                        placeholder="Input a monetary value"
                        i18n-placeholder
                        [(ngModel)]="entryValue"/>
                    </div>
                  }
                  @case ('string') {
                    <div class="input-group">
                      <label for="entryValue" class="input-group-text" i18n>Value</label>
                        <input id="entryValue"
                          class="form-control" type="text"
                          name="entryValue"
                          placeholder="Input a value"
                          i18n-placeholder
                          [(ngModel)]="entryValue"/>
                      </div>
                    }
                    @case ('interval') {
                      <div class="input-group">
                        <label for="entryValue" class="input-group-text" i18n>Value</label>
                          <input id="entryValue"
                            class="form-control" type="text"
                            name="entryValue"
                            placeholder="e.g. 1 day, 4 months"
                            i18n-placeholder
                            [(ngModel)]="entryValue"/>
                        </div>
                      }
                      @case ('bool') {
                        <div class="input-group">
                          <label for="entryValue" class="input-group-text" i18n>Value</label>
                            <select id="entryValue"
                              class="form-select" name="entryValue"
                              placeholder="True or False" i18n-placeholder
                              [(ngModel)]="entryValue">
                              <option value='true' i18n>True</option>
                                <option value='false' i18n>False</option>
                                </select>
                              </div>
                            }
                            @case ('array') {
                              <div class="input-group">
                                <label for="entryValue" class="input-group-text" i18n>Value</label>
                                  <input id="entryValue"
                                    class="form-control" type="text"
                                    name="entryValue"
                                    placeholder="Input a comma-separated list..."
                                    i18n-placeholder
                                    [(ngModel)]="entryValue"/>
                                </div>
                              }
                              @case ('link') {
                                <div class="input-group">
                                  <label for="entryValue" class="input-group-text" i18n>Value</label>
                                    @switch (entry.fmClass) {
                                      @case ('acpl') {
                                        <eg-item-location-select [permFilter]="entry.view_perm" domId="entryValue"
                                          [contextOrgId]="entryContext" (valueChange)="setInputValue($event ? $event.id() : null)">
                                        </eg-item-location-select>
                                      }
                                      @default {
                                        <eg-combobox placeholder="Select a value" [idlClass]="entry.fmClass" idlField="name"
                                          [asyncSupportsEmptyTermClick]="true" [displayTemplate]="fmClassLabel" domId="entryValue"
                                          (onChange)="setInputValue($event ? $event.id : null)">
                                        </eg-combobox>
                                      }
                                    }
                                    <!-- fmClass ngSwitch -->
                                  </div>
                                }
                                @case ('timezone') {
                                  <div class="input-group">
                                    <eg-timezone-select
                                      [(ngModel)]="entryValue">
                                    </eg-timezone-select>
                                  </div>
                                }
                              }
                              <!-- input type ngSwitch -->
                            </div>
                          </div>
                        </div>
                        <div class="modal-footer">
                          <button type="button" class="btn btn-success"
                            (click)="update()" i18n>Update Setting</button>
                            <button type="button" class="btn btn-normal"
                              (click)="delete()" i18n>Delete Setting</button>
                            </div>
                          </ng-template>

                          <ng-template #fmClassLabel let-r="result" i18n>
                             {{r.label}}
</ng-template>
