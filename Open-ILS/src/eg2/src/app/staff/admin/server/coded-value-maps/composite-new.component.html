@if (values.pointType) {
  <div class="row ms-2 mt-4 p-2 border border-secondary">
    <div class="col-lg-12">
      @if (values.pointType==='attr') {
        <h3 class="text-center">
          Record Attribute
        </h3>
      }
      @if (values.pointType==='bool') {
        <h3 class="text-center">
          Boolean Operator
        </h3>
      }
    </div>
    <div class="col-lg-12 common-form striped-odd form-validated">
      @if (values.pointType==='attr') {
        <div class="row mb-1">
          <div class="col-lg-4">
            <label id="type" class="form-label col-form-label" i18n>Select Attribute Type:</label>
          </div>
          <div class="col-lg-8">
            <eg-combobox [entries]="attrTypes" [required]="true" aria-labelledby="type"
              (onChange)="typeChange($event)" placeholder="Attribute Type" i18n-placeholder>
            </eg-combobox>
          </div>
        </div>
        <div class="row mb-1">
          <div class="col-lg-4">
            <label id="value" class="form-label col-form-label" i18n>Select Value:</label>
          </div>
          <div class="col-lg-8">
            <eg-combobox #valComboBox [entries]="attrVals" [required]="true" aria-labelledby="value"
              (onChange)="valueChange($event)" placeholder="Value" i18n-placeholder>
            </eg-combobox>
          </div>
        </div>
      }
      @if (values.pointType==='bool') {
        <div class="row mb-1">
          <div class="col-lg-4 col-form-label">Operator:</div>
          <div class="col-lg-8">
            <select class="form-select" [(ngModel)]="values.boolOp">
              <option value='AND' i18n>AND</option>
              <option value='OR' i18n>OR</option>
              <option value='NOT' i18n>NOT</option>
            </select>
          </div>
        </div>
      }
    </div>
  </div>
}
