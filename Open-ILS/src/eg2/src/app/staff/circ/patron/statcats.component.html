

@for (map of catMaps; track map) {
  <div class="mt-2 alert well-like d-flex ms-3 me-3">
    <div class="fw-bold p-1">{{map.stat_cat().name()}}</div>
    <div class="flex-1 ms-2 p-1">{{map.stat_cat_entry()}}</div>
    <div class="ms-2 p-1">
      @if (map.stat_cat().opac_visible() === 'f') {
        <div class="rounded-pill bg-primary p-1" i18n>Staff Only</div>
      }
      @if (map.stat_cat().opac_visible() === 't') {
        <div class="rounded-pill bg-warning p-1" i18n>Patron Visible</div>
      }
    </div>
    <div class="p-1" i18n> &#64; {{map.stat_cat().owner().shortname()}}</div>
  </div>
}
