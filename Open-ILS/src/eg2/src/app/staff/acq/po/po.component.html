@if (poService.currentPo) {
  <eg-staff-banner i18n-bannerText
    bannerText="Purchase Order #{{poId}} ({{poService.currentPo.state()}})">
  </eg-staff-banner>
}

<eg-acq-po-summary [poId]="poId"></eg-acq-po-summary>

@if (!isBasePage()) {
  <div class="mt-2">
    <a routerLink="/staff/acq/po/{{poId}}" queryParamsHandling="merge" class="btn btn-sm btn-info" i18n>Return</a>
  </div>
}

<router-outlet></router-outlet>

<hr class="mt-3 pt-3"/>

<!-- gets its po from poService -->
@if (isBasePage()) {
  <eg-acq-po-charges></eg-acq-po-charges>
}
