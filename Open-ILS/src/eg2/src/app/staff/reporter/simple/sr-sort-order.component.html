<!-- eslint-disable @angular-eslint/template/button-has-type -->
<div class="order-row">

  <div ngbAccordion class="col-md-6">
    <div ngbAccordionItem>
      <h5 ngbAccordionHeader>
        <button ngbAccordionButton i18n>Field Display Order</button>
      </h5>
      <div ngbAccordionCollapse>
        <div ngbAccordionBody>
          <ng-template>
            @for (f of fields; track f; let idx = $index) {
              <eg-sr-field
                [field]=f
                [withAlias]=true
                [withTransforms]=true
                [withUpDown]=true
                [disableUp]="idx === 0"
                [disableDown]="idx === (fields.length - 1)"
                (fieldChange)="updateField($event)"
                (upEvent)="moveDisplayUp(idx)"
                (downEvent)="moveDisplayDown(idx)"
                >
              </eg-sr-field>
            }
          </ng-template>
        </div>
      </div>
    </div>
  </div>

  <div ngbAccordion class="col-md-6">
    <div ngbAccordionItem>
      <h5 ngbAccordionHeader>
        <button ngbAccordionButton i18n>Field Sort Order</button>
      </h5>
      <div ngbAccordionCollapse>
        <div ngbAccordionBody>
          <ng-template>
            @for (f of fieldsInOrderByOrder(); track f; let idx = $index) {
              <eg-sr-field
                [field]=f
                [withAlias]=true
                [editAlias]=false
                [withUpDown]=true
                [withSortDirection]=true
                [disableUp]="idx === 0"
                [disableDown]="idx === (fields.length - 1)"
                (fieldChange)="updateField($event)"
                (upEvent)="moveOrderUp(idx)"
                (downEvent)="moveOrderDown(idx)"
                >
              </eg-sr-field>
            }
          </ng-template>
        </div>
      </div>
    </div>
  </div>

</div>
